# Blueprint Render — https://render.com/docs/blueprint-spec
# Variáveis com sync: false serão pedidas na primeira configuração no dashboard.
#
# IMPORTANTE: valores com ":" (ex. modelo Mistral) têm de ir entre aspas em YAML.

services:
  - type: web
    name: mari-agentos
    runtime: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: MARIA_MODEL
        value: "mistral:mistral-small-latest"
      - key: MISTRAL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
