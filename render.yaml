# Blueprint Render — https://render.com/docs/blueprint-spec
# Variáveis com sync: false serão pedidas na primeira configuração no dashboard.
#
# IMPORTANTE: valores com ":" (ex. modelo Mistral) têm de ir entre aspas em YAML.

services:
  - type: web
    name: mari-agentos
    runtime: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: MARIA_MODEL
        value: "mistral:pixtral-large-latest"
      - key: MISTRAL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Painel React: GET /api/maria/leads (não uses a service role no browser).
      - key: MARIA_ADMIN_API_KEY
        sync: false
      # Opcional: origens CORS separadas por vírgula, ex. https://app.teudominio.com
      - key: MARIA_CORS_ORIGINS
        sync: false
      # WhatsApp (UAZAPI): base do servidor + token da instância (não o admin token).
      - key: UAZAPI_BASE_URL
        sync: false
      - key: UAZAPI_INSTANCE_TOKEN
        sync: false
      # Opcional: mesmo valor num header X-UAZAPI-WEBHOOK-Secret nas chamadas do webhook.
      - key: UAZAPI_WEBHOOK_SECRET
        sync: false
      # Opcional: "true" para responder em grupos (usa JID completo em send/text).
      - key: UAZAPI_ALLOW_GROUPS
        sync: false
